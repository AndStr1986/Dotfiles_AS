add_newline = false
# A minimal left prompt
format = """
[¯éÂ](maroon)\
$os\
[¯é┤ ](maroon)\
$directory\
$git_branch\
$git_status\
$line_break\
$character
"""
palette = "catppuccin_mocha"
# move the rest of the prompt to the right
right_format = """
$python\
$lua\
$jobs\
$cmd_duration\
$all\
"""
command_timeout = 1000

[python]
style = 'teal'
symbol = '¯êÁ '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[character]
vicmd_symbol = '[N] >>>'
success_symbol = '[Ô×£](bold green)'

[directory.substitutions]
'~/tests/starship-custom' = 'work-project'

[git_branch]
format =  '[$symbol$branch(:$remote_branch)]($style)'

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = "¯î¢ "

[golang]
format = '[¯ÿº ](bold cyan)'

[kubernetes]
symbol = 'Ôÿ© '
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  { context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer", style = "green", context_alias = "omerxx", symbol = "´ê│ " },
]

[docker_context]
disabled = true

